<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DPS 模擬器</title>
<style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --panel: rgba(15, 23, 42, 0.92);
      --panel-2: #1e293b;
      --panel-3: rgba(2, 6, 23, 0.72);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #a78bfa;
      --good: #22c55e;
      --danger: #f87171;
      --border: rgba(148, 163, 184, 0.18);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
      background: radial-gradient(circle at top, rgba(167, 139, 250, 0.18), transparent 35%), linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: var(--text);
      padding: 24px;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    h1, h2, h3, p { margin: 0; }

    .hero,
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .hero {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }

    .hero p,
    .muted,
    .empty,
    .note {
      color: var(--muted);
      line-height: 1.65;
    }

    .tag,
    .summary-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
    }

    .tag {
      background: rgba(167, 139, 250, 0.14);
      color: #ddd6fe;
    }

    .summary-pill {
      background: rgba(34, 197, 94, 0.14);
      color: #bbf7d0;
    }

    .toolbar,
    .grid,
    .results,
    .compact-grid,
    .skill-grid,
    .affix-grid {
      display: grid;
      gap: 16px;
    }

    .toolbar,
    .grid {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      margin-top: 18px;
    }

    .results {
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      margin-top: 18px;
    }

    .compact-grid {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .skill-grid,
    .affix-grid {
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      margin-top: 12px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #cbd5e1;
    }

    input,
    select {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: var(--panel-2);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 12px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.16);
    }

    .stat {
      background: var(--panel-3);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    .stat strong {
      font-size: 30px;
      line-height: 1.2;
      color: white;
      word-break: break-word;
    }

    .highlight {
      border-color: rgba(34, 197, 94, 0.35);
      background: linear-gradient(180deg, rgba(34, 197, 94, 0.1), rgba(2, 6, 23, 0.84));
    }

    .roster-wrap {
      display: grid;
      gap: 16px;
      margin-top: 18px;
    }

    .team-block {
      background: rgba(2, 6, 23, 0.44);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .team-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .character-row {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(0, 0.8fr) auto auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid transparent;
      background: rgba(15, 23, 42, 0.82);
    }

    .character-row.active {
      border-color: rgba(167, 139, 250, 0.45);
      box-shadow: inset 0 0 0 1px rgba(167, 139, 250, 0.2);
    }

    .char-name {
      font-weight: 600;
      color: white;
    }

    .char-sub,
    .char-dps,
    .team-dps {
      color: var(--muted);
      font-size: 13px;
    }

    .char-dps strong,
    .team-dps strong {
      color: #f8fafc;
      font-size: 16px;
    }

    .btn,
    .icon-btn {
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn {
      padding: 12px 14px;
      background: linear-gradient(180deg, rgba(167, 139, 250, 0.24), rgba(167, 139, 250, 0.12));
      color: #f5f3ff;
      border: 1px solid rgba(167, 139, 250, 0.3);
    }

    .btn:hover,
    .icon-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    .btn.secondary {
      background: rgba(148, 163, 184, 0.12);
      border-color: rgba(148, 163, 184, 0.18);
      color: var(--text);
    }

    .btn.danger,
    .icon-btn.danger {
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.25);
      color: #fecaca;
    }

    .icon-btn {
      min-width: 44px;
      min-height: 44px;
      padding: 0 12px;
      background: rgba(148, 163, 184, 0.12);
      border: 1px solid rgba(148, 163, 184, 0.18);
      color: var(--text);
    }

    .empty {
      padding: 12px 0 4px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 20;
    }

    .modal.open {
      display: flex;
    }

    .modal-card {
      width: min(1080px, 100%);
      max-height: min(90vh, 100%);
      overflow: auto;
      background: rgba(15, 23, 42, 0.98);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 20px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .sub-card {
      background: rgba(2, 6, 23, 0.44);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
    }

    .section-stack {
      display: grid;
      gap: 14px;
    }

    .skill-item {
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.7);
      border-radius: 16px;
      padding: 14px;
      margin-top: 12px;
    }

    .skill-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .note {
      font-size: 13px;
      margin-top: 10px;
    }

    @media (max-width: 900px) {
      .character-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      body { padding: 16px; }
      .card,
      .modal-card { padding: 18px; }
      .stat strong { font-size: 24px; }
      .modal { padding: 16px; }
    }
  </style>
</head>
<body>
<div class="wrap">
<section class="card hero">
<h1>DPS 模擬器</h1>
<p>依照你給的公式重做，主畫面只保留核心結果，角色改成用彈窗設定。</p>
<div class="tag">最多 12 角色，4 隊</div>
<div id="advisorBox" style="
  margin-top:16px;
  padding:14px;
  border-radius:12px;
  background:#020617;
  border:1px solid rgba(148,163,184,0.2);
  font-size:14px;
  line-height:1.6;
">
  軍師建議：等待計算...
</div><div id="affixAdvisor" style="margin-top:10px;padding:10px 12px;border-radius:10px;background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.22);font-size:13px;line-height:1.6;color:#ddd6fe;">詞綴建議：等待分析...</div>
</section>
<section class="card">
<div class="section-head">
<h2>戰鬥設定</h2>
<div class="summary-pill" id="partySummary">隊伍總 DPS：0</div>
</div>
<div class="toolbar">
<div>
<label for="monsterSelect">怪物</label>
<select id="monsterSelect"></select>
</div>
<div>
<label for="fightSeconds">戰鬥秒數</label>
<input id="fightSeconds" min="1" step="1" type="number" value="60"/>
</div>
<div>
<label> </label>
<button class="btn" id="openCharacterModal">新增角色</button>
</div>
</div>
<div class="roster-wrap" id="roster"></div>
</section>
<section class="card">
<div class="section-head">
<h2>核心結果</h2>
<p class="muted" id="selectedCharacterName">尚未選取角色</p>
</div>
<div class="results">
<div class="stat">
<span>非暴擊傷害</span>
<strong id="nonCritHit">-</strong>
</div>
<div class="stat">
<span>暴擊傷害</span>
<strong id="avgHit">-</strong>
</div>
<div class="stat">
<span>有效攻速</span>
<strong id="effectiveAps">-</strong>
</div>
<div class="stat highlight">
<span>期望 DPS</span>
<strong id="dps">-</strong>
</div>
<div class="stat">
<span>本次戰鬥總傷</span>
<strong id="fightDamage">-</strong>
</div>
</div>
</section>
</div>
<div aria-hidden="true" class="modal" id="characterModal">
<div class="modal-card">
<div class="section-head">
<h2 id="modalTitle"></h2>
<button class="icon-btn" id="closeModal" type="button">✕</button>
</div>
<div class="sub-card section-stack">
<div class="compact-grid">
<div>
<label for="charName">角色名稱</label>
<input id="charName" placeholder="例如：主力輸出" type="text"/>
</div>
<div>
<label for="charTeam">隊伍</label>
<select id="charTeam">
<option value="1">第 1 隊</option>
<option value="2">第 2 隊</option>
<option value="3">第 3 隊</option>
<option value="4">第 4 隊</option>
</select>
</div>
<div>
<label for="charTemplate">角色模板</label>
<select id="charTemplate">
<option value="蘭德克莉特">蘭德克莉特</option>
</select>
</div>
<div>
<label for="charLeader">隊長</label>
<select id="charLeader">
<option value="0">否</option>
<option value="1">是</option>
</select>
</div>
</div>
</div>
<div class="sub-card section-stack">
<h3>屬性</h3>
<div class="grid">
<div><label for="atk">攻擊力</label><input id="atk" step="0.01" type="number" value="0"/></div>
<div><label for="hp">生命值</label><input id="hp" step="0.01" type="number" value="0"/></div>
<div><label for="pdef">物理防禦</label><input id="pdef" step="0.01" type="number" value="0"/></div>
<div><label for="mdef">魔法防禦</label><input id="mdef" step="0.01" type="number" value="0"/></div>
<div><label for="aspd">攻擊間隔（秒）</label><input id="aspd" step="0.01" type="number" value="1"/></div>
<div><label for="pPen">物理穿透</label><input id="pPen" step="0.01" type="number" value="0"/></div>
<div><label for="mPen">魔法穿透</label><input id="mPen" step="0.01" type="number" value="0"/></div>
<div><label for="crit">暴擊率 (%)</label><input id="crit" step="0.01" type="number" value="0"/></div>
<div><label for="critDmg">暴擊傷害 (%)</label><input id="critDmg" step="0.01" type="number" value="100"/></div>
</div>
</div>
<div class="sub-card section-stack">
<h3>武器詞綴</h3>
<div id="weaponRows"></div>
</div>
<div class="sub-card section-stack">
<h3>Buff（3，常駐）</h3>
<div id="buffRows"></div>
</div>
<div class="sub-card section-stack">
<div class="section-head">
<h3>技能</h3>
<button class="btn secondary" id="addSkill" type="button">新增技能</button>
</div>
<div id="skillList"></div>
<p class="note">技能週期可直接填秒數。</p>
</div>
<div class="modal-actions">
<button class="btn secondary" id="cancelModal" type="button">取消</button>
<button class="btn" id="saveCharacter" type="button">儲存角色</button>
</div>
<div style="
position:sticky;
bottom:0;
background:rgba(15,23,42,0.9);
backdrop-filter:blur(10px);
padding:14px;
border-top:1px solid rgba(148,163,184,0.2);
display:flex;
justify-content:flex-end;
gap:10px;
"><button class="btn" id="saveCharacterSticky" style="padding:10px 18px;border-radius:10px;background:linear-gradient(180deg,#7c3aed,#5b21b6);color:#fff;border:none;">儲存角色</button></div></div>
</div>
<script>
    const MAX_CHARACTERS = 12;
    const TEAM_COUNT = 4;

    const CHARACTER_TEMPLATES = {
      '蘭德克莉特': {
        atk: 1466,
        hp: 5453,
        pdef: 312,
        mdef: 409,
        aspd: 2,
        pPen: 409,
        mPen: 373,
        crit: 34,
        critDmg: 104,
        skills: [
          { name: '1C', damageType: 'physical', hits: 1, hitMultiplier: 2.5, cycle: 10 },
          { name: '2C', damageType: 'physical', hits: 1, hitMultiplier: 3.75, cycle: 10 },
          { name: '3C', damageType: 'physical', hits: 1, hitMultiplier: 14.09, cycle: 10 }
        ]
      }
    };

    const MONSTERS = {
      '普草人': { hp: 105, atk: 15, def: -3, pRes: -3, mRes: -3 },
      '黑暗巨龍': { hp: 4801265, atk: 1119, def: 323, pRes: 323, mRes: 323 }
    };

    const EFFECT_OPTIONS = [
      { value: 'none', label: '無' },
      { value: 'atkPct', label: '攻擊力%' },
      { value: 'critPct', label: '暴擊率%' },
      { value: 'penPct', label: '穿透%' },
      { value: 'finalDamagePct', label: '最終傷害%' },
      { value: 'skillDamagePct', label: '技能傷害%' },
      { value: 'pPenFlat', label: '物理穿透' },
      { value: 'mPenFlat', label: '魔法穿透' }
    ];

    const state = {
      monsterKey: '普草人',
      fightSeconds: 60,
      characters: [],
      selectedId: null,
      editingId: null,
      skillDrafts: []
    };

    const el = {
      monsterSelect: document.getElementById('monsterSelect'),
      fightSeconds: document.getElementById('fightSeconds'),
      partySummary: document.getElementById('partySummary'),
      roster: document.getElementById('roster'),
      selectedCharacterName: document.getElementById('selectedCharacterName'),
      nonCritHit: document.getElementById('nonCritHit'),
      avgHit: document.getElementById('avgHit'),
      effectiveAps: document.getElementById('effectiveAps'),
      dps: document.getElementById('dps'),
      fightDamage: document.getElementById('fightDamage'),
      modal: document.getElementById('characterModal'),
      modalTitle: document.getElementById('modalTitle'),
      charName: document.getElementById('charName'),
      charTeam: document.getElementById('charTeam'),
      charTemplate: document.getElementById('charTemplate'),
      charLeader: document.getElementById('charLeader'),
      atk: document.getElementById('atk'),
      hp: document.getElementById('hp'),
      pdef: document.getElementById('pdef'),
      mdef: document.getElementById('mdef'),
      aspd: document.getElementById('aspd'),
      pPen: document.getElementById('pPen'),
      mPen: document.getElementById('mPen'),
      crit: document.getElementById('crit'),
      critDmg: document.getElementById('critDmg'),
      weaponRows: document.getElementById('weaponRows'),
      buffRows: document.getElementById('buffRows'),
      skillList: document.getElementById('skillList')
    };

    const nf = new Intl.NumberFormat('zh-TW', { maximumFractionDigits: 2 });

    function uid(prefix = 'id') {
      return `${prefix}-${Math.random().toString(36).slice(2, 9)}`;
    }

    function num(value) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function optionsHtml(selectedValue = 'none') {
      return EFFECT_OPTIONS.map((option) => `<option value="${option.value}" ${option.value === selectedValue ? 'selected' : ''}>${option.label}</option>`).join('');
    }

    function applyCharacterTemplate(templateName) {
      const template = CHARACTER_TEMPLATES[templateName];
      if (!template) return;

      if (!el.charName.value.trim()) el.charName.value = templateName;
      el.atk.value = template.atk ?? 0;
      el.hp.value = template.hp ?? 0;
      el.pdef.value = template.pdef ?? 0;
      el.mdef.value = template.mdef ?? 0;
      el.aspd.value = template.aspd ?? 1;
      el.pPen.value = template.pPen ?? 0;
      el.mPen.value = template.mPen ?? 0;
      el.crit.value = template.crit ?? 0;
      el.critDmg.value = template.critDmg ?? 100;
      state.skillDrafts = (template.skills || []).map((skill) => createSkillDraft(skill));
      renderSkills();
    }

    function clearCharacterTemplateSelection() {
      el.charTemplate.value = '';
    }

    function createEffectRows(container, prefix, count) {
      container.innerHTML = '';
      for (let i = 0; i < count; i += 1) {
        const row = document.createElement('div');
        row.className = 'affix-grid';
        row.innerHTML = `
          <div>
            <label>${prefix} ${i + 1} 類型</label>
            <select data-kind="type" data-index="${i}">${optionsHtml()}</select>
          </div>
          <div>
            <label>${prefix} ${i + 1} 數值</label>
            <input data-kind="value" data-index="${i}" type="number" step="0.01" value="0" />
          </div>
        `;
        container.appendChild(row);
      }
    }

    function createSkillDraft(skill = {}) {
      return {
        id: skill.id || uid('skill'),
        name: skill.name || '',
        damageType: skill.damageType || 'physical',
        hits: skill.hits ?? 1,
        hitMultiplier: skill.hitMultiplier ?? 1,
        cycle: skill.cycle ?? 10
      };
    }

    function renderSkills() {
      el.skillList.innerHTML = '';

      if (!state.skillDrafts.length) {
        const empty = document.createElement('p');
        empty.className = 'empty';
        empty.textContent = '目前沒有技能。';
        el.skillList.appendChild(empty);
        return;
      }

      state.skillDrafts.forEach((skill, index) => {
        const item = document.createElement('div');
        item.className = 'skill-item';
        item.innerHTML = `
          <div class="skill-top">
            <strong>${skill.name || `技能 ${index + 1}`}</strong>
            <button class="icon-btn danger" type="button" data-remove-skill="${skill.id}">刪除</button>
          </div>
          <div class="skill-grid">
            <div>
              <label>技能名稱</label>
              <input data-skill="name" data-id="${skill.id}" type="text" value="${escapeHtml(skill.name)}" />
            </div>
            <div>
              <label>傷害類型</label>
              <select data-skill="damageType" data-id="${skill.id}">
                <option value="physical" ${skill.damageType === 'physical' ? 'selected' : ''}>物理</option>
                <option value="magic" ${skill.damageType === 'magic' ? 'selected' : ''}>魔法</option>
              </select>
            </div>
            <div>
              <label>次數</label>
              <input data-skill="hits" data-id="${skill.id}" type="number" step="0.01" value="${skill.hits}" />
            </div>
            <div>
              <label>單次倍率</label>
              <input data-skill="hitMultiplier" data-id="${skill.id}" type="number" step="0.01" value="${skill.hitMultiplier}" />
            </div>
            <div>
              <label>週期（秒）</label>
              <input data-skill="cycle" data-id="${skill.id}" type="number" step="0.01" value="${skill.cycle}" />
            </div>
          </div>
        `;
        el.skillList.appendChild(item);
      });
    }

    function escapeHtml(value = '') {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function initMonsterSelect() {
      el.monsterSelect.innerHTML = Object.keys(MONSTERS)
        .map((key) => `<option value="${key}">${key}</option>`)
        .join('');
      el.monsterSelect.value = state.monsterKey;
    }

    function readEffectRows(container) {
      const rows = [];
      const rowCount = container.querySelectorAll('[data-kind="type"]').length;
      for (let i = 0; i < rowCount; i += 1) {
        rows.push({
          type: container.querySelector(`[data-kind="type"][data-index="${i}"]`).value,
          value: num(container.querySelector(`[data-kind="value"][data-index="${i}"]`).value)
        });
      }
      return rows;
    }

    function fillEffectRows(container, rows) {
      const types = container.querySelectorAll('[data-kind="type"]');
      const values = container.querySelectorAll('[data-kind="value"]');
      types.forEach((node, index) => {
        node.value = rows[index]?.type || 'none';
      });
      values.forEach((node, index) => {
        node.value = rows[index]?.value ?? 0;
      });
    }

    function aggregateEffects(character) {
      const totals = {
        atkPct: 0,
        critPct: 0,
        penPct: 0,
        finalDamagePct: 0,
        skillDamagePct: 0,
        pPenFlat: 0,
        mPenFlat: 0
      };

      [...character.weapons, ...character.buffs].forEach((entry) => {
        if (!entry || !totals.hasOwnProperty(entry.type)) return;
        totals[entry.type] += num(entry.value);
      });

      return totals;
    }

    function getDefenseContext(monster, damageType, totalPen) {
      const resistance = damageType === 'magic' ? monster.mRes : monster.pRes;
      const effectivePen = Math.max(totalPen - resistance, 0);
      const penRate = effectivePen / (effectivePen + 100);
      const effectiveDefense = (monster.def - totalPen) * (1 - penRate);
      const damageMultiplier = 100 / (100 + effectiveDefense);
      return { resistance, effectivePen, penRate, effectiveDefense, damageMultiplier };
    }

    function computeCharacter(character, monster, fightSeconds) {
      const totals = aggregateEffects(character);
      const actionInterval = Math.max(num(character.aspd), 0.01);
      const attackFrequency = 1 / actionInterval;
      let leaderBonus = character.isLeader ? 1.1 : 1;
const autoDps = num(character.atk) * leaderBonus * 2 * attackFrequency;

      const critRate = Math.max(0, num(character.crit) / 100 + totals.critPct / 100);
      const critMultiplier = 1 + num(character.critDmg) / 100;
      const critFactor = (1 - Math.min(critRate, 1)) + Math.min(critRate, 1) * critMultiplier + Math.max(critRate - 1, 0) * 0.5;

      const atkFactor = 1 + totals.atkPct / 100;
      const finalDamageFactor = 1 + totals.finalDamagePct / 100;
      const skillDamageFactor = 1 + totals.skillDamagePct / 100;
      const penFactor = 1 + totals.penPct / 100;

      const skills = character.skills.map((skill) => {
        const cycle = num(skill.cycle);
        if (cycle <= 0) {
          return { ...skill, skillMultiplier: 0, nonCritCast: 0, avgCast: 0, dps: 0 };
        }

        const basePen = skill.damageType === 'magic' ? num(character.mPen) + totals.mPenFlat : num(character.pPen) + totals.pPenFlat;
        const totalPen = basePen * penFactor;
        const defense = getDefenseContext(monster, skill.damageType, totalPen);
        const skillMultiplier = num(skill.hits) * num(skill.hitMultiplier);
        const nonCritCast = skillMultiplier * num(character.atk) * atkFactor * defense.damageMultiplier * finalDamageFactor * skillDamageFactor;
        const avgCast = nonCritCast * critFactor;
        const critCast = nonCritCast * critMultiplier;
        const dps = avgCast / cycle;

        return {
          ...skill,
          skillMultiplier,
          nonCritCast,
          avgCast,
          critCast,
          dps
        };
      });

      const skillDps = skills.reduce((sum, skill) => sum + skill.dps, 0);
      const totalDps = (autoDps + skillDps) * (character.isLeader ? 1.05 : 1);
      const firstSkill = skills[0];
      const fallbackNonCrit = num(character.atk) * 2;
      const fallbackCrit = fallbackNonCrit * critMultiplier;

      return {
        autoDps,
        totalDps,
        fightDamage: totalDps * fightSeconds,
        attackFrequency,
        nonCritHit: firstSkill ? firstSkill.nonCritCast : fallbackNonCrit,
        critHit: firstSkill ? firstSkill.critCast : fallbackCrit,
        skills
      };
    }

      const monster = MONSTERS[state.monsterKey];
      return state.characters.map((character) => ({

function getAdvisorV2(character) {
  if (!character) return { text: "尚未選擇角色", color: "#999" };

  const atk = Number(character.atk);
  const critRate = Number(character.crit) / 100;
  const critDmg = Number(character.critDmg) / 100;

  const skillMul = character.skills[0]?.hitMultiplier * character.skills[0]?.hits || 1;

  const base = atk * skillMul * (1 + critRate * critDmg);

  const atkGain = ((atk * 1.1 * skillMul * (1 + critRate * critDmg)) - base) / base;
  const critGain = ((atk * skillMul * (1 + (critRate + 0.1) * critDmg)) - base) / base;
  const critDmgGain = ((atk * skillMul * (1 + critRate * (critDmg + 0.2))) - base) / base;

  const best = Math.max(atkGain, critGain, critDmgGain);

  let bestText = "";
  let color = "#66ff99";

  if (best === critGain) {
    bestText = "🔴 最優先：暴擊率";
    color = "#f87171";
  } else if (best === critDmgGain) {
    bestText = "🟡 次優先：暴擊傷害";
    color = "#facc15";
  } else {
    bestText = "🟢 可提升：攻擊力";
    color = "#22c55e";
  }

  return {
    text:
      bestText + "\n\n" +
      "📊 提升比較：\n" +
      "攻擊 +10% → +" + (atkGain * 100).toFixed(1) + "%\n" +
      "暴擊 +10% → +" + (critGain * 100).toFixed(1) + "%\n" +
      "暴傷 +20% → +" + (critDmgGain * 100).toFixed(1) + "%",
    color
  };
}

function getAdvisorV2(character) {
  if (!character) return { text: "尚未選擇角色", color: "#999" };

  const atk = Number(character.atk);
  const critRate = Number(character.crit) / 100;
  const critDmg = Number(character.critDmg) / 100;

  const skillMul = character.skills[0]?.hitMultiplier * character.skills[0]?.hits || 1;

  const base = atk * skillMul * (1 + critRate * critDmg);

  const atkGain = ((atk * 1.1 * skillMul * (1 + critRate * critDmg)) - base) / base;
  const critGain = ((atk * skillMul * (1 + (critRate + 0.1) * critDmg)) - base) / base;
  const critDmgGain = ((atk * skillMul * (1 + critRate * (critDmg + 0.2))) - base) / base;

  const best = Math.max(atkGain, critGain, critDmgGain);

  let bestText = "";
  let color = "#66ff99";

  if (best === critGain) {
    bestText = "🔴 最優先：暴擊率";
    color = "#f87171";
  } else if (best === critDmgGain) {
    bestText = "🟡 次優先：暴擊傷害";
    color = "#facc15";
  } else {
    bestText = "🟢 可提升：攻擊力";
    color = "#22c55e";
  }

  return {
    text:
      bestText + "\n\n" +
      "📊 提升比較：\n" +
      "攻擊 +10% → +" + (atkGain * 100).toFixed(1) + "%\n" +
      "暴擊 +10% → +" + (critGain * 100).toFixed(1) + "%\n" +
      "暴傷 +20% → +" + (critDmgGain * 100).toFixed(1) + "%",
    color
  };
}
